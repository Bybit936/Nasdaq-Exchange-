<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nasdaq Trade</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 0 10px;
}

/* HEADER FIXED */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 0;
}

/* LOGO */
.logo {
  font-size: 18px;
  font-weight: bold;
  white-space: nowrap;
}

/* NAV */
nav {
  display: flex;
  align-items: center;
  gap: 8px;
}

nav a {
  text-decoration: none;
  color: white;
  font-size: 13px;
  white-space: nowrap;
}

/* SIGNUP BUTTON */
.signup-btn {
  background: #ff8c00;
  color: black !important;
  padding: 6px 10px;
  border-radius: 5px;
  font-weight: bold;
}

/* HERO */
.hero {
  min-height: 70vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.hero h1 {
  font-size: 30px;
  text-align: center;
}

.hero p {
  font-size: 16px;
  text-align: center;
  margin-bottom: 20px;
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 10px;
}

button {
  padding: 12px 22px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  border-radius: 5px;
}

.signup {
  background: #ff8c00;
  color: black;
  font-weight: bold;
}

.login {
  background: #222;
  color: white;
}

/* FEATURES */
.features {
  padding: 40px 10px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.box {
  background: #111;
  padding: 20px;
  text-align: center;
  border-radius: 10px;
  font-size: 14px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: gray;
  font-size: 12px;
}

/* DESKTOP */
@media(min-width:768px) {

  .logo {
    font-size: 22px;
  }

  nav a {
    font-size: 15px;
  }

  .hero h1 {
    font-size: 42px;
  }

  .features {
    grid-template-columns: repeat(4, 1fr);
  }
}
</style>
</head>

<body>

<div class="container">

<header>
  <div class="logo">Nasdaq Trade</div>
  <nav>
    <a href="#">Markets</a>
    <a href="#">Trade</a>
    <a href="#" class="signup-btn">Sign Up</a>
  </nav>
</header>

<section class="hero">
  <h1>Trusted Crypto Exchange Platform</h1>
  <p>Deposit & Earn Profit Easily</p>

  <div class="buttons">
    <button class="signup">Sign Up</button>
    <button class="login">Login</button>
  </div>
</section>

<section class="features">
  <div class="box">🔒 Secure System</div>
  <div class="box">⚡ Fast Withdraw</div>
  <div class="box">📈 High Profit</div>
  <div class="box">👥 Referral System</div>
</section>

<footer>
  <p>© 2026 Nasdaq Trade</p>
</footer>

</div>

</body>
</html>
