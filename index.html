<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Trade App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

.container {
  padding: 20px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  background: green;
  color: white;
  border: none;
}

.card {
  background: #111;
  padding: 10px;
  margin: 5px 0;
}
</style>
</head>

<body>

<div class="container" id="app"></div>

<script>

// START PAGE
showHome();

function showHome() {
  document.getElementById("app").innerHTML = `
    <h2>Login / Signup</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
  `;
}

// SIGNUP
function signup() {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  if (!email || !pass) {
    alert("Fill all fields");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];

  if (users.find(u => u.email === email)) {
    alert("User already exists");
    return;
  }

  let user = {
    email: email,
    password: pass,
    balance: 100
  };

  users.push(user);
  localStorage.setItem("users", JSON.stringify(users));

  alert("Signup success ($100 bonus)");
}

// LOGIN
function login() {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  let user = users.find(u => u.email === email && u.password === pass);

  if (!user) {
    alert("Invalid login");
    return;
  }

  localStorage.setItem("currentUser", JSON.stringify(user));

  showDashboard(user);
}

// DASHBOARD
function showDashboard(user) {
  document.getElementById("app").innerHTML = `
    <h2>Welcome</h2>
    <p>Balance: $${user.balance}</p>

    <button onclick="deposit()">Deposit</button>
    <button onclick="withdraw()">Withdraw</button>

    <h3>Market</h3>
    <div id="market"></div>

    <h3>Chart</h3>
    <div id="chartBox"></div>

    <button onclick="logout()">Logout</button>
  `;

  loadMarket();
}

// MARKET
async function loadMarket() {
  let coins = ["BTC","ETH","BNB"];
  let html = "";

  for (let c of coins) {
    let res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${c}USDT`);
    let data = await res.json();

    html += `
      <div class="card">
        <div onclick="openChart('${c}')">
          ${c} - $${parseFloat(data.price).toFixed(2)}
        </div>
        <button onclick="buy('${c}')">Buy</button>
        <button onclick="sell('${c}')">Sell</button>
      </div>
    `;
  }

  document.getElementById("market").innerHTML = html;
}

// BUY
function buy(coin) {
  let user = JSON.parse(localStorage.getItem("currentUser"));

  if (user.balance < 10) {
    alert("Not enough balance");
    return;
  }

  user.balance -= 10;
  updateUser(user);

  alert("Bought " + coin);
  showDashboard(user);
}

// SELL
function sell(coin) {
  let user = JSON.parse(localStorage.getItem("currentUser"));

  user.balance += 10;
  updateUser(user);

  alert("Sold " + coin);
  showDashboard(user);
}

// UPDATE USER
function updateUser(user) {
  localStorage.setItem("currentUser", JSON.stringify(user));

  let users = JSON.parse(localStorage.getItem("users")) || [];
  users = users.map(u => u.email === user.email ? user : u);
  localStorage.setItem("users", JSON.stringify(users));
}

// EXTRA
function deposit() {
  alert("Coming soon");
}

function withdraw() {
  let user = JSON.parse(localStorage.getItem("currentUser"));

  if (user.balance < 20000) {
    alert("Minimum withdraw $20000");
  } else {
    alert("Withdraw sent");
  }
}

function logout() {
  localStorage.removeItem("currentUser");
  showHome();
}

// CHART
function openChart(symbol) {
  document.getElementById("chartBox").innerHTML = `
    <iframe src="https://www.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}USDT&theme=dark"
    style="width:100%; height:400px;"></iframe>
  `;
}

</script>

</body>
</html>
