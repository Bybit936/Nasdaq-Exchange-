<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nasdaq Trade</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000000;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
}

header h2 {
  font-size: 22px;
}

nav a {
  margin-left: 15px;
  text-decoration: none;
  color: white;
  font-size: 15px;
}

.signup-btn {
  background: #ff8c00;
  color: black !important;
  padding: 8px 14px;
  border-radius: 6px;
  font-weight: bold;
}

/* HERO */
.hero {
  min-height: 90vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.hero h1 {
  font-size: 36px;
  text-align: center;
  margin-bottom: 15px;
}

.hero p {
  font-size: 18px;
  margin-bottom: 25px;
  text-align: center;
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 15px;
}

button {
  padding: 14px 30px;
  border: none;
  cursor: pointer;
  font-size: 16px;
  border-radius: 6px;
}

.signup {
  background: #ff8c00;
  color: black;
  font-weight: bold;
}

.login {
  background: #222;
  color: white;
}

/* FEATURES */
.features {
  padding: 50px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.box {
  background: #111;
  padding: 25px;
  text-align: center;
  border-radius: 12px;
  font-size: 16px;
  transition: 0.3s;
}

.box:hover {
  background: #ff8c00;
  color: black;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: gray;
  font-size: 14px;
}

/* DESKTOP */
@media(min-width:768px) {
  .hero h1 {
    font-size: 50px;
  }

  .features {
    grid-template-columns: repeat(4, 1fr);
  }
}
</style>
</head>

<body>

<header>
  <h2>Nasdaq Trade</h2>
  <nav>
    <a href="#">Markets</a>
    <a href="#">Trade</a>
    <a href="#" class="signup-btn">Sign Up</a>
  </nav>
</header>

<section class="hero">
  <h1>Trusted Crypto Exchange Platform</h1>
  <p>Deposit & Earn Profit Easily</p>

  <div class="buttons">
    <button class="signup">Sign Up</button>
    <button class="login">Login</button>
  </div>
</section>

<section class="features">
  <div class="box">🔒 Secure System</div>
  <div class="box">⚡ Fast Withdraw</div>
  <div class="box">📈 High Profit</div>
  <div class="box">👥 Referral System</div>
</section>

<footer>
  <p>© 2026 Nasdaq Trade</p>
</footer>

</body>
</html>
