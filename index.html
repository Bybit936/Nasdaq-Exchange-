<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nasdaq Trade</title>

<style>
body {
  background: #0b0e11;
  color: white;
  font-family: Arial;
  margin: 0;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
}

header h2 {
  font-size: 20px;
}

nav a {
  margin: 8px;
  font-size: 14px;
  text-decoration: none;
  color: white;
}

/* SIGNUP BUTTON STYLE */
.signup-btn {
  background: #fcd535;
  color: black !important;
  padding: 6px 12px;
  border-radius: 5px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 15px;
}

.hero h1 {
  font-size: 28px;
}

.hero p {
  font-size: 16px;
}

button {
  padding: 12px 20px;
  margin: 8px;
  border: none;
  cursor: pointer;
  font-size: 15px;
  width: 140px;
}

.signup {
  background: #fcd535;
  color: black;
}

.login {
  background: #2b3139;
  color: white;
}

/* FEATURES */
.features {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 10px;
}

.box {
  background: #1c1f26;
  padding: 20px;
  margin: 10px;
  width: 90%;
  max-width: 300px;
  text-align: center;
  border-radius: 10px;
  font-size: 16px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 15px;
  color: gray;
  font-size: 13px;
}

/* DESKTOP VERSION */
@media(min-width:768px) {
  .hero h1 {
    font-size: 40px;
  }

  .features {
    flex-direction: row;
    justify-content: center;
  }

  .box {
    width: 200px;
  }
}
</style>
</head>

<body>

<header>
  <h2>Nasdaq Trade</h2>
  <nav>
    <a href="#">Markets</a>
    <a href="#">Trade</a>
    <a href="#" class="signup-btn">Sign Up</a>
  </nav>
</header>

<section class="hero">
  <h1>Trusted Crypto Exchange Platform</h1>
  <p>Deposit & Earn Profit Easily</p>
  <button class="signup">Sign Up</button>
  <button class="login">Login</button>
</section>

<section class="features">
  <div class="box">🔒 Secure System</div>
  <div class="box">⚡ Fast Withdraw</div>
  <div class="box">📈 High Profit</div>
  <div class="box">👥 Referral System</div>
</section>

<footer>
  <p>© 2026 Nasdaq Trade</p>
</footer>

</body>
</html>
