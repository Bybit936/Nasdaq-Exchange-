<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nasdaq Exchange</title>

<style>
body{margin:0;font-family:Arial;background:#0b0e11;color:white;}
.header{padding:15px;font-size:22px;font-weight:bold;text-align:center;}
.card{background:#161a1e;margin:12px;padding:15px;border-radius:12px;}
.btn{background:#fcd535;border:none;padding:8px 12px;border-radius:6px;margin:3px;}
.coin{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #222;}
.nav{position:fixed;bottom:0;width:100%;display:flex;background:#111;}
.nav div{flex:1;text-align:center;padding:10px;}
.page{display:none;}
.active{display:block;}
</style>

</head>
<body>

<div class="header">📊 Nasdaq Exchange</div>

<!-- LOGIN -->
<div id="login" class="page active">
<div class="card">
<h3>Login / Signup</h3>
<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<input id="ref" placeholder="Referral Code"><br><br>

<button class="btn" onclick="signup()">Signup</button>
<button class="btn" onclick="login()">Login</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="page">
<div class="card">
<h2 id="bal">Balance: $1000</h2>
<button class="btn" onclick="buy()">Deposit</button>
<button class="btn" onclick="adminAdd()">+ Admin Add</button>
<button class="btn" onclick="adminRemove()">- Admin Remove</button>
</div>
</div>

<!-- MARKET -->
<div id="market" class="page">
<div class="card">
<h3>Market</h3>
<div id="coinList"></div>
</div>
</div>

<!-- ASSETS -->
<div id="assets" class="page">
<div class="card">
<h3>Your Assets</h3>
<p id="bal2">$1000</p>
<button class="btn" onclick="buy()">Deposit</button>
<button class="btn" onclick="sell()">Withdraw</button>
</div>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="show('home')">Home</div>
<div onclick="show('market')">Market</div>
<div onclick="show('assets')">Assets</div>
</div>

<script>

// NAV
function show(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

// USERS
let users = JSON.parse(localStorage.getItem("users")) || {};
let adminUser="admin";

// SIGNUP
function signup(){
let u=user.value.trim();
let p=pass.value.trim();
let r=ref.value.trim();

if(!u||!p)return alert("Fill fields");

let bal=1000;
if(r==="@Ganjiwan@"){bal+=100;}

users[u]={password:p,balance:bal};
localStorage.setItem("users",JSON.stringify(users));

alert("Signup success");
}

// LOGIN
function login(){
let u=user.value.trim();
let p=pass.value.trim();

if(!users[u])return alert("User not found");
if(users[u].password!==p)return alert("Wrong pass");

localStorage.setItem("loggedUser",u);

bal.innerText="Balance: $"+users[u].balance;
bal2.innerText="$"+users[u].balance;

show("home");
}

// ADMIN
function adminAdd(){
let u=localStorage.getItem("loggedUser");
if(u!==adminUser)return alert("Only admin");

let amt=parseInt(prompt("Amount"));
users[u].balance+=amt;
update(u);
}

function adminRemove(){
let u=localStorage.getItem("loggedUser");
if(u!==adminUser)return alert("Only admin");

let amt=parseInt(prompt("Amount"));
users[u].balance-=amt;
update(u);
}

function update(u){
localStorage.setItem("users",JSON.stringify(users));
bal.innerText="Balance: $"+users[u].balance;
bal2.innerText="$"+users[u].balance;
}

// MARKET API
async function loadMarket(){
let res=await fetch("https://api.binance.com/api/v3/ticker/price");
let data=await res.json();

coinList.innerHTML="";

data.slice(0,50).forEach(c=>{
if(c.symbol.endsWith("USDT")){
let price=(c.price*0.95).toFixed(2);

coinList.innerHTML+=`
<div class="coin">
${c.symbol} $${price}
<button onclick="buy()">Buy</button>
<button onclick="sell()">Sell</button>
</div>`;
}
});
}
loadMarket();

// WALLET
function buy(){
alert("Send USDT to wallet");
}

function sell(){
alert("Contact support");
}

</script>

</body>
</html>
