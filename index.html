j<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nasdaq Trade</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 0 10px;
}

/* HEADER FIXED */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 0;
}

/* LOGO */
.logo {
  font-size: 18px;
  font-weight: bold;
  white-space: nowrap;
}

/* NAV */
nav {
  display: flex;
  align-items: center;
  gap: 8px;
}

nav a {
  text-decoration: none;
  color: white;
  font-size: 13px;
  white-space: nowrap;
}

/* SIGNUP BUTTON */
.signup-btn {
  background: #ff8c00;
  color: black !important;
  padding: 6px 10px;
  border-radius: 5px;
  font-weight: bold;
}

/* HERO */
.hero {
  min-height: 70vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.hero h1 {
  font-size: 30px;
  text-align: center;
}

.hero p {
  font-size: 16px;
  text-align: center;
  margin-bottom: 20px;
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 10px;
}

button {
  padding: 12px 22px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  border-radius: 5px;
}

.signup {
  background: #ff8c00;
  color: black;
  font-weight: bold;
}

.login {
  background: #222;
  color: white;
}

/* FEATURES */
.features {
  padding: 40px 10px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.box {
  background: #111;
  padding: 20px;
  text-align: center;
  border-radius: 10px;
  font-size: 14px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: gray;
  font-size: 12px;
}

/* DESKTOP */
@media(min-width:768px) {

  .logo {
    font-size: 22px;
  }

  nav a {
    font-size: 15px;
  }

  .hero h1 {
    font-size: 42px;
  }

  .features {
    grid-template-columns: repeat(4, 1fr);
  }
}
</style>
</head>

<body>

<div class="container">

<header>
  <div class="logo">Nasdaq Trade</div>
  <nav>
  <a href="#">Markets</a>
  <a href="#">Trade</a>
  <a href="signup.html" class="signup-btn">Sign Up</a>
</nav>
</header>

<section class="hero">
  <h1>Trusted Crypto Exchange Platform</h1>
  <p>Deposit & Earn Profit Easily</p>

  <div class="buttons">
    <button class="signup" onclick="window.location.href='signup.html'">Sign Up</button>

<button class="login" onclick="window.location.href='signup.html'">Login</button>
  </div>
</section>

<section class="features">
  <div class="box">🔒 Secure System</div>
  <div class="box">⚡ Fast Withdraw</div>
  <div class="box">📈 High Profit</div>
  <div class="box">👥 Referral System</div>
</section>

<footer>
  <p>© 2026 Nasdaq Trade</p>
</footer>

</div>
<script>
let generatedOTP = "";

function scrollToAuth() {
  document.getElementById("authSection").scrollIntoView({ behavior: "smooth" });
}

function sendOTP() {
  let pass = document.getElementById("password").value;
  let confirm = document.getElementById("confirm").value;
  let terms = document.getElementById("terms").checked;

  if (pass !== confirm) return alert("Password not match");
  if (!terms) return alert("Accept Terms");

  generatedOTP = "1234";
  alert("OTP: 1234");

  document.getElementById("otpBox").style.display = "block";
}

function verifyOTP() {
  let otp = document.getElementById("otp").value;

  if (otp == generatedOTP) {
    let user = {
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    };

    localStorage.setItem("user", JSON.stringify(user));
    alert("Signup Successful!");
  } else {
    alert("Wrong OTP");
  }
}

function login() {
  let email = document.getElementById("loginEmail").value;
  let pass = document.getElementById("loginPass").value;

  let saved = JSON.parse(localStorage.getItem("user"));

  if (!saved) return alert("Please signup first");

  if (email === saved.email && pass === saved.password) {
    alert("Login Successful!");
  } else {
    alert("Wrong email or password");
  }
}

<!-- AUTH SECTION START -->
<div id="authSection" style="max-width:400px; margin:50px auto; background:#111; padding:20px; border-radius:10px;">

<h2 style="text-align:center;">Sign Up</h2>

<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirm" placeholder="Confirm Password">
<input type="text" id="ref" value="Jasaara@" placeholder="Referral Code">

<button onclick="sendOTP()">Send OTP</button>

<div id="otpBox" style="display:none;">
  <input type="text" id="otp" placeholder="Enter OTP">
  <button onclick="verifyOTP()">Verify & Signup</button>
</div>

<div>
  <input type="checkbox" id="terms"> I agree to Terms
</div>

<hr>

<h2 style="text-align:center;">Login</h2>

</div>
