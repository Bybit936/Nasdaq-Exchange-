function login() {
  let email = document.getElementById("loginEmail").value;
  let pass = document.getElementById("loginPass").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

let saved = users.find(u => u.email === email && u.password === pass);

  if (!saved) return alert("Wrong email or password");
  localStorage.setItem("currentUser", JSON.stringify(saved));
  showDashboard(saved);
}
  function showDashboard(user) {
  document.body.innerHTML = `
  <div style="background:#000; color:white; min-height:100vh; padding:15px;">

    <h2>${user.name || "User"}</h2>

}/h3>

async function loadMarket() {
  let coins = ["BTC","ETH","BNB","SOL","XRP","ADA","DOGE","TRX","DOT","MATIC"];

  let html = "";

  for (let c of coins) {
    let res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${c}USDT`);
let data = await res.json();
let price = parseFloat(data.price).toFixed(2);
html += `
<div style="background:#111; margin:5px; padding:10px; border-radius:8px; display:flex; justify-content:space-between;">
  <div onclick="openChart('${c}')" style="cursor:pointer;">
  ${c} - $${price}
</div>
  <div>
    <button onclick="buy('${c}')" style="background:green;color:white;">Buy</button>
    <button onclick="sell('${c}')" style="background:red;color:white;">Sell</button>
  </div>
</div>
`;
  });

  document.getElementById("market").innerHTML = html;
}

function deposit() {
  alert("Deposit system coming soon");
}

function withdraw() {
  let user = JSON.parse(localStorage.getItem("currentUser"));
  if (user.balance < 20000) {
    alert("Minimum withdraw is $20000");
  } else {
    alert("Withdraw request sent");
  }
}

function buy(coin) {
  let user = JSON.parse(localStorage.getItem("currentUser"));

  if (user.balance < 10) {
    alert("Not enough balance");
    return;
  }

  user.balance -= 10;

  localStorage.setItem("currentUser", JSON.stringify(user));

  alert("Bought " + coin);
showDashboard(user);
setTimeout(() => openChart(coin), 200);
}

function sell(coin) {
  let user = JSON.parse(localStorage.getItem("currentUser"));

  user.balance += 10;

  localStorage.setItem("currentUser", JSON.stringify(user));

  alert("Sold " + coin);
showDashboard(user);
setTimeout(() => openChart(coin), 200);
}
  function openChart(symbol) {
  document.getElementById("chartBox").innerHTML = `
    <iframe 
      src="https://www.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}USDT&interval=15&theme=dark"
      style="width:100%; height:400px; border:none;">
    </iframe>
  `;
  }
