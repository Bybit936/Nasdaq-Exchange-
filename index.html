<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nasdaq Exchange</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0e11;
  color:white;
}

.header {
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

.box {
  background:#111;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

button {
  background:#fcd535;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  margin:3px;
}

.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#111;
  padding:10px;
}

.coin {
  display:flex;
  justify-content:space-between;
  margin:8px 0;
}

</style>
</head>

<body>

<div class="header">📊 Nasdaq Exchange</div>

<!-- HOME -->
<div id="home">
  <div class="box">
    <h2>Total Balance</h2>
    <h1>$<span id="balance">1060</span></h1>
    <button onclick="deposit()">Add Funds</button>
  </div>

  <div class="box">
    <h3>🔥 Hot Coins</h3>
    <div id="hotCoins"></div>
  </div>
</div>

<!-- MARKET -->
<div id="market" style="display:none">
  <div class="box">
    <h3>📈 Market</h3>
    <div id="coinList"></div>
  </div>
</div>

<!-- ASSET -->
<div id="asset" style="display:none">
  <div class="box">
    <h3>Balance: $<span id="balance2">1060</span></h3>
    <button onclick="deposit()">Deposit</button>
    <button onclick="withdraw()">Withdraw</button>
  </div>

  <div class="box">
    <h3>🔥 Activity</h3>
    <div id="activity"></div>
  </div>
</div>

<!-- SUPPORT -->
<div id="support" style="display:none">
  <div class="box">
    <h3>Support</h3>
    <button onclick="contact()">Contact Support</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom">
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('market')">Market</button>
  <button onclick="showPage('asset')">Assets</button>
  <button onclick="showPage('support')">Support</button>
</div>

<script>

// NAVIGATION
function showPage(page){
  ["home","market","asset","support"].forEach(p=>{
    document.getElementById(p).style.display="none";
  });
  document.getElementById(page).style.display="block";
}

// WALLET
let wallet = "TQWTVcqKppmKvx53rdNRbADhRrLb7Gcm";

function deposit(){
  alert("Send USDT (TRC20) to:\n\n"+wallet);
}

function withdraw(){
  alert("After proceeding, customer support will contact you 📞");
}

function contact(){
  alert("Support will contact you soon 📞");
}

// HOT COINS
let hotCoins = ["BTC","ETH","BNB","SOL","DOGE"];

function loadHotCoins(){
  let box=document.getElementById("hotCoins");
  box.innerHTML="";
  hotCoins.forEach(c=>{
    let price=(Math.random()*50000).toFixed(2);
    box.innerHTML+=`
    <div class="coin">
      ${c}/USDT - $${price}
      <button onclick="buy()">Buy</button>
    </div>`;
  });
}
loadHotCoins();

// MARKET (100 coins)
let coins=[];
for(let i=1;i<=100;i++){
  coins.push("COIN"+i);
}

function loadMarket(){
  let list=document.getElementById("coinList");
  list.innerHTML="";
  coins.forEach(c=>{
    let price=(Math.random()*100).toFixed(3);
    list.innerHTML+=`
    <div class="coin">
      ${c}/USDT - $${price}
      <div>
        <button onclick="buy()">Buy</button>
        <button onclick="sell()">Sell</button>
      </div>
    </div>`;
  });
}
loadMarket();

function buy(){
  alert("Send payment to TRC20 wallet:\n\n"+wallet);
}

function sell(){
  alert("Contact support to sell 📞");
}

// ACTIVITY (LIVE FEEL)
setInterval(()=>{
  let users=["Zain","Ahmed","Sara","Ali"];
  let coins=["BTC","ETH","USDT"];

  let name=users[Math.floor(Math.random()*users.length)];
  let coin=coins[Math.floor(Math.random()*coins.length)];
  let amount=Math.floor(Math.random()*2000);

  let type=Math.random()>0.5?"deposited":"withdrew";
  let color=type==="deposited"?"lime":"red";

  document.getElementById("activity").innerHTML=
  `<p style="color:${color}">${name} ${type} $${amount} ${coin}</p>`
  +document.getElementById("activity").innerHTML;

},3000);

</script>

</body>
</html>
