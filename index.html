<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nasdaq Trade</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0e11;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
}

header h2 {
  margin: 0;
}

nav a {
  margin-left: 15px;
  text-decoration: none;
  color: white;
  font-size: 14px;
}

.signup-btn {
  background: #fcd535;
  color: black !important;
  padding: 6px 12px;
  border-radius: 5px;
}

/* HERO FULL SCREEN */
.hero {
  min-height: 80vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.hero h1 {
  font-size: 32px;
  text-align: center;
  margin-bottom: 10px;
}

.hero p {
  font-size: 16px;
  margin-bottom: 20px;
  text-align: center;
}

.buttons {
  display: flex;
  gap: 10px;
}

button {
  padding: 12px 25px;
  border: none;
  cursor: pointer;
  font-size: 15px;
  border-radius: 5px;
}

.signup {
  background: #fcd535;
  color: black;
}

.login {
  background: #2b3139;
  color: white;
}

/* FEATURES */
.features {
  padding: 40px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.box {
  background: #1c1f26;
  padding: 20px;
  text-align: center;
  border-radius: 10px;
  font-size: 15px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: gray;
  font-size: 13px;
}

/* DESKTOP */
@media(min-width:768px) {
  .hero h1 {
    font-size: 45px;
  }

  .features {
    grid-template-columns: repeat(4, 1fr);
  }
}
</style>
</head>

<body>

<header>
  <h2>Nasdaq Trade</h2>
  <nav>
    <a href="#">Markets</a>
    <a href="#">Trade</a>
    <a href="#" class="signup-btn">Sign Up</a>
  </nav>
</header>

<section class="hero">
  <h1>Trusted Crypto Exchange Platform</h1>
  <p>Deposit & Earn Profit Easily</p>

  <div class="buttons">
    <button class="signup">Sign Up</button>
    <button class="login">Login</button>
  </div>
</section>

<section class="features">
  <div class="box">🔒 Secure System</div>
  <div class="box">⚡ Fast Withdraw</div>
  <div class="box">📈 High Profit</div>
  <div class="box">👥 Referral System</div>
</section>

<footer>
  <p>© 2026 Nasdaq Trade</p>
</footer>

</body>
</html>
