<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nasdaq Exchange</title>

<style>
body{margin:0;font-family:Arial;background:#0b0e11;color:white;}
.header{padding:15px;text-align:center;font-weight:bold;}
.card{background:#161a1e;margin:10px;padding:15px;border-radius:10px;}
.btn{background:#fcd535;border:none;padding:8px 12px;border-radius:6px;margin:3px;}
.coin{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #222;}
.nav{position:fixed;bottom:0;width:100%;display:flex;background:#111;}
.nav div{flex:1;text-align:center;padding:10px;}
.page{display:none;}
.active{display:block;}
input{width:95%;padding:10px;border:none;border-radius:6px;}
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:black;z-index:9999;padding:10px;overflow:auto;}
</style>
</head>

<body>

<div class="header">📊 Nasdaq Exchange</div>

<!-- SIGNUP -->
<div id="signup" class="page active">
<div class="card">
<h3>Create Account</h3>
<input id="su_user" placeholder="Username"><br><br>
<input id="su_email" placeholder="Email"><br><br>
<input id="su_pass" type="password" placeholder="Password"><br><br>
<input id="su_cpass" type="password" placeholder="Confirm Password"><br><br>
<button class="btn" onclick="signup()">Signup</button>
</div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
<div class="card">
<h3>Login</h3>
<input id="li_user" placeholder="Username / Email"><br><br>
<input id="li_pass" type="password" placeholder="Password"><br><br>
<button class="btn" onclick="login()">Login</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="page">
<div class="card">
<h2 id="bal">Balance: $0</h2>
<button class="btn" onclick="buyWallet()">Deposit</button>
</div>
</div>

<!-- MARKET -->
<div id="market" class="page">
<div class="card">
<h3>Market</h3>
<div id="coinList"></div>
</div>
</div>

<!-- ASSETS -->
<div id="assets" class="page">
<div class="card">
<h3>Assets</h3>
<p id="bal2">$0</p>
<button class="btn" onclick="buyWallet()">Deposit</button>
<button class="btn" onclick="sell()">Withdraw</button>
<div id="activity"></div>
</div>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="openPage('home')">🏠</div>
<div onclick="openPage('market')">📊</div>
<div onclick="openPage('assets')">💰</div>
</div>

<script>

// USERS
let users = JSON.parse(localStorage.getItem("users")) || {};

// ADMIN
if(!users["Goharjaan"]){
users["Goharjaan"]={
email:"goharjaanh786@gmail.com",
password:"goharjaanh786",
balance:0,
referralUsed:true,
isAdmin:true
};
localStorage.setItem("users",JSON.stringify(users));
}

// NAV LOCK
function openPage(p){
let u=localStorage.getItem("loggedUser");
if(!u){alert("Login first ❌");return;}
show(p);
}

// PAGE SWITCH
function show(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

// SIGNUP
function signup(){
let u=su_user.value.trim();
let e=su_email.value.trim();
let p=su_pass.value.trim();
let cp=su_cpass.value.trim();

if(!u||!e||!p||!cp) return alert("Fill all fields");
if(p!==cp) return alert("Passwords not match");
if(users[u]) return alert("User exists");

users[u]={email:e,password:p,balance:0,referralUsed:false};

localStorage.setItem("users",JSON.stringify(users));

alert("Account created ✅");
show("login");
}

// LOGIN
function login(){
let input=li_user.value.trim();
let p=li_pass.value.trim();

let found=null;

for(let u in users){
if(u===input||users[u].email===input){
found=u;
}
}

if(!found) return alert("User not found");
if(users[found].password!==p) return alert("Wrong password");

localStorage.setItem("loggedUser",found);

// referral
if(!users[found].referralUsed){
let code=prompt("Enter Referral Code");
if(code==="@Ganjiwan@"){
users[found].balance+=20;
users[found].referralUsed=true;
alert("$20 bonus added 🎉");
}
}

update(found);
show("home");
}

// UPDATE
function update(u){
bal.innerText="Balance: $"+users[u].balance;
bal2.innerText="$"+users[u].balance;
localStorage.setItem("users",JSON.stringify(users));
}

// MARKET
async function loadMarket(){
let res=await fetch("https://api.binance.com/api/v3/ticker/24hr");
let data=await res.json();

coinList.innerHTML="";

data.slice(0,100).forEach(c=>{
if(c.symbol.endsWith("USDT")){
let price=(c.lastPrice*0.95).toFixed(2);

coinList.innerHTML+=`
<div class="coin" onclick="openChart('${c.symbol}')">
${c.symbol} $${price}
<div>
<button onclick="openChart('${c.symbol}');event.stopPropagation()">Buy</button>
<button onclick="openChart('${c.symbol}');event.stopPropagation()">Sell</button>
</div>
</div>`;
}
});
}
loadMarket();

// TRADING SCREEN
function openChart(symbol){
let d=document.createElement("div");
d.className="popup";

d.innerHTML=`
<h2>${symbol}</h2>

<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}&theme=dark"
width="100%" height="300"></iframe>

<div style="background:#161a1e;padding:10px;border-radius:10px;">
<input id="amt" placeholder="Enter amount $"><br><br>

<button class="btn" style="background:lime" onclick="buyCoin('${symbol}')">Buy</button>
<button class="btn" style="background:red;color:white" onclick="sellCoin('${symbol}')">Sell</button>
</div>

<br>
<button class="btn" onclick="closeP()">Close</button>
`;

document.body.appendChild(d);
}

function closeP(){
document.querySelector(".popup").remove();
}

// BUY
function buyCoin(symbol){
let u=localStorage.getItem("loggedUser");
let amt=parseFloat(document.getElementById("amt").value);

if(!amt||amt<=0) return alert("Invalid amount");

if(users[u].balance<amt) return alert("Low balance");

users[u].balance-=amt;
update(u);

alert(`Bought ${symbol} $${amt}`);
}

// SELL
function sellCoin(symbol){
alert(`Sell request for ${symbol}`);
}

// WALLET
function buyWallet(){
alert("Send USDT (TRC20)");
}

// FAKE ACTIVITY
let names=["Ali (Pakistan)","Rahul (India)","John (USA)","अमित (India)","Sara (UK)"];
setInterval(()=>{
let n=names[Math.floor(Math.random()*names.length)];
let amt=Math.floor(Math.random()*2000);
activity.innerHTML+=`<p style="color:lime">${n} deposited $${amt}</p>`;
},3000);

// AUTO LOGIN
window.onload=function(){
let u=localStorage.getItem("loggedUser");
if(u && users[u]){
update(u);
show("home");
}
}

</script>

</body>
</html>
